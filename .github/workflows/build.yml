name: Build LocalBridge

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: localbridge-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    name: Android Release Artifacts
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 8.10.2

      - name: Set up Android SDK command line tools
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set Android keystore path
        shell: bash
        run: echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/localbridge-release.keystore" >> "$GITHUB_ENV"

      - name: Materialize Android release keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          chmod 600 "$ANDROID_KEYSTORE_PATH"

      - name: Resolve Android key alias
        shell: bash
        run: |
          if [[ -n "${ANDROID_KEY_ALIAS:-}" ]] && keytool -list -keystore "$ANDROID_KEYSTORE_PATH" -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" >/dev/null 2>&1; then
            echo "Using Android key alias from secrets."
            exit 0
          fi

          resolved_alias="$(keytool -list -v -keystore "$ANDROID_KEYSTORE_PATH" -storepass "$ANDROID_KEYSTORE_PASSWORD" | awk -F': ' '/Alias name:/{print $2; exit}')"

          if [[ -z "$resolved_alias" ]]; then
            echo "Unable to determine the Android keystore alias." >&2
            exit 1
          fi

          echo "ANDROID_KEY_ALIAS=$resolved_alias" >> "$GITHUB_ENV"

      - name: Build Android release outputs
        run: gradle :app:assembleRelease :app:bundleRelease --stacktrace

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-artifacts
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

  macos:
    name: macOS Apple Silicon Package
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 8.10.2

      - name: Build macOS DMG
        shell: bash
        run: gradle :app:packageReleaseDmg --stacktrace

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-artifacts
          path: app/build/compose/binaries/**/*.dmg
          if-no-files-found: error
